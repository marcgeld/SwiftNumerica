name: MLX Trait

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "Sources/SwiftNumericaMLX/**"
      - "Sources/SwiftNumerica/**"
      - "Package.swift"
      - ".github/workflows/mlx-adapter.yml"
  pull_request:
    paths:
      - "Sources/SwiftNumericaMLX/**"
      - "Sources/SwiftNumerica/**"
      - "Package.swift"
      - ".github/workflows/mlx-adapter.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlx-trait-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build with MLX trait enabled
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build with MLX trait
        run: swift build --traits MLX
